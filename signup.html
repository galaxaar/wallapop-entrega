<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/notifications/styles.css">
    <style>
        body {
            background-color: #f8f9fa;
            /* Color de fondo */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-signin {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <section class="notifications-container"></section>
    <section class="spinner-container"></section>

    <main class="form-signin text-center">
        <form id="signup-form" novalidate>
            <h1 class="h3 mb-3 fw-normal">Regístrate</h1>

            <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
                <label for="email">Correo electrónico</label>
            </div>

            
            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="password" placeholder="Contraseña" minlength="8" required>
                <label for="password">Contraseña</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="confirm-password" class="form-control" id="confirm-password" placeholder="Confirmar contraseña" minlength="8" required>
                <label for="floatingPassword">Confirmar contraseña</label>
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">Crear cuenta</button>
            <p class="mt-3">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="signup.js"></script>

</body>

</html>
