<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear anuncio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/notifications/styles.css">
</head>
<body>

    <header class="session-container"></header>

    <section class="notifications-container"></section>
    <section class="spinner-container"></section>

    <main class="container mt-5">
        <h1 class="mb-4">Crear anuncio</h1>

        <form id="create-product-form" novalidate> 

            <div class="mb-3">
                <label for="image" class="form-label">Foto (opcional)</label>
                <input type="file" name="image" class="form-control" id="image" accept="image/*">
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">Nombre *</label>
                <input type="text" name="name" class="form-control" id="name" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Descripción *</label>
                <textarea name="description" class="form-control" id="description" rows="3" required></textarea>
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">Precio *</label>
                <input type="number" name="price" class="form-control" id="price" min="0" required>
            </div>

            <div class="mb-3">
                <label for="type" class="form-label">Tipo *</label>
                <select name="type" class="form-select" id="type" required>
                    <option value="">Selecciona una opción</option>
                    <option value="venta">Venta</option>
                    <option value="compra">Compra</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Crear anuncio</button>

        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="create-product.js"></script>
</body>
</html>
